<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anki - ReKindle</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            color: #000000;
            font-family: sans-serif;
            overflow: hidden;
        }
        #titlebar {
            display: flex;
            align-items: center;
            height: 50px;
            border-bottom: 2px solid #000000;
            padding: 0 15px;
            background-color: #ffffff;
        }
        .back-button {
            text-decoration: none;
            color: #000000;
            font-size: 24px;
            font-weight: bold;
            margin-right: 15px;
        }
        .app-title {
            font-size: 20px;
            font-weight: bold;
        }
        #content {
            width: 100%;
            height: calc(100% - 52px);
            border: none;
        }
    </style>
</head>
<body>
    <div id="titlebar">
        <a href="index.html" class="back-button">←</a>
        <div class="app-title">AnkiWeb</div>
    </div>
    
    <!-- Link atualizado para carregar a página de login/cadastro -->
    <iframe id="content" src="https://ankiweb.net/account/signup" title="AnkiWeb"></iframe>
</body>
</html>
