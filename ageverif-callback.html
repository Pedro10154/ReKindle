<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Verification — ReKindle</title>
    <style>
        body {
            font-family: "Courier New", Courier, monospace;
            background: #e5e5e5;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: 4px 4px 0px #000000;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }
        .message {
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .spinner {
            border: 3px solid #000;
            border-top: 3px solid transparent;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid black;
            background: #ddd;
            color: black;
            text-decoration: none;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #bbb;
        }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>
</head>
<body>
    <div class="window">
        <div class="title">Age Verification</div>
        <div id="status">
            <div class="spinner"></div>
            <div class="message">Processing your verification...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDY7x7vVmlYUyVZNLuCCmIQYa6PWFVfZqQ",
            authDomain: "rekindle-dd1fa.firebaseapp.com",
            projectId: "rekindle-dd1fa",
            storageBucket: "rekindle-dd1fa.firebasestorage.app",
            messagingSenderId: "839711414865",
            appId: "1:839711414865:web:8b736969651375c9c1f6b9"
        };
        firebase.initializeApp(firebaseConfig);

        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const statusEl = document.getElementById('status');

        function showMessage(html, isError) {
            statusEl.innerHTML = html;
        }

        if (!code || !state) {
            showMessage('<div class="error">Missing verification code or state.</div>', true);
        } else {
            const completeFn = firebase.functions().httpsCallable('completeAgeVerification');
            completeFn({ code, state })
                .then(function(result) {
                    const data = result.data;
                    if (data.success) {
                        showMessage(
                            '<div class="success">Age verification complete!</div>' +
                            '<div class="message">You can now return to your Kindle device. ' +
                            'The social app will automatically update.</div>'
                        );
                    } else {
                        showMessage(
                            '<div class="error">Verification failed</div>' +
                            '<div class="message">' + (data.reason || 'Unable to verify age.') + '</div>'
                        );
                    }
                })
                .catch(function(err) {
                    showMessage(
                        '<div class="error">Verification failed</div>' +
                        '<div class="message">' + (err.message || 'An unexpected error occurred.') + '</div>'
                    );
                });
        }
    </script>
</body>
</html>
